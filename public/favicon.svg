<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tapasya favicon: a quiet flame on warm ground -->
  <rect width="100" height="100" rx="20" fill="#FBF9F4"/>
  <!-- Outer glow: sage circle -->
  <circle cx="50" cy="54" r="28" fill="#4F7A5A" opacity="0.1"/>
  <!-- Flame body: terracotta, gentle -->
  <path
    d="M50 25
       C50 25, 36 42, 36 55
       C36 63, 42 70, 50 70
       C58 70, 64 63, 64 55
       C64 42, 50 25, 50 25Z"
    fill="#A66B5A"
    opacity="0.85"
  />
  <!-- Inner flame: amber warmth -->
  <path
    d="M50 38
       C50 38, 43 48, 43 55
       C43 59, 46 62, 50 62
       C54 62, 57 59, 57 55
       C57 48, 50 38, 50 38Z"
    fill="#B89466"
    opacity="0.9"
  />
  <!-- Center glow -->
  <ellipse cx="50" cy="57" rx="4" ry="6" fill="#FBF9F4" opacity="0.6"/>
</svg>
